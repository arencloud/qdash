apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdash
  namespace: qdash-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdash
  template:
    metadata:
      labels:
        app: qdash
    spec:
      serviceAccountName: qdash-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: qdash
        image: ghcr.io/egevorky/qdash:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - name: http
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: qdash-config
        - secretRef:
            name: qdash-secret
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
