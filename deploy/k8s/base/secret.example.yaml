apiVersion: v1
kind: Secret
metadata:
  name: qdash-secret
  namespace: qdash-system
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/qdash?sslmode=disable"
  OIDC_ISSUER_URL: "https://issuer.example.com/realms/main"
  OIDC_CLIENT_ID: "qdash"
  OIDC_CLIENT_SECRET: "replace-me"
