apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: qdash
  namespace: qdash-system
spec:
  host: qdash.apps.example.openshift.local
  to:
    kind: Service
    name: qdash
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
