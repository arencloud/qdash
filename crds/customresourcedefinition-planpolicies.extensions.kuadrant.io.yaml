spec:
  group: extensions.kuadrant.io
  names:
    plural: planpolicies
    singular: planpolicy
    kind: PlanPolicy
    listKind: PlanPolicyList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: PlanPolicy enables rate limiting through plans of identified requests
          type: object
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: PlanPolicySpec defines the desired state of PlanPolicy
              type: object
              required:
                - plans
                - targetRef
              properties:
                plans:
                  description: Plans defines the list of plans for the policy. The identity is categorised by the first matching plan in the list.
                  type: array
                  items:
                    type: object
                    required:
                      - predicate
                      - tier
                    properties:
                      limits:
                        description: Limits contains the list of limits that the plan enforces.
                        type: object
                        properties:
                          custom:
                            description: Custom defines any additional limits defined in terms of a RateLimitPolicy Rate.
                            type: array
                            items:
                              description: Rate defines the actual rate limit that will be used when there is a match
                              type: object
                              required:
                                - limit
                                - window
                              properties:
                                limit:
                                  description: Limit defines the max value allowed for a given period of time
                                  type: integer
                                window:
                                  description: Window defines the time period for which the Limit specified above applies.
                                  type: string
                                  pattern: '^([0-9]{1,5}(h|m|s|ms)){1,4}$'
                          daily:
                            description: Daily limit of requests for this plan.
                            type: integer
                          monthly:
                            description: Monthly limit of requests for this plan.
                            type: integer
                          weekly:
                            description: Weekly limit of requests for this plan.
                            type: integer
                          yearly:
                            description: Yearly limit of requests for this plan.
                            type: integer
                      predicate:
                        description: Predicate is a CEL expression used to determine if the plan is applied.
                        type: string
                        minLength: 1
                      tier:
                        description: Tier this plan represents.
                        type: string
                targetRef:
                  description: Reference to the object to which this policy applies.
                  type: object
                  required:
                    - group
                    - kind
                    - name
                  properties:
                    group:
                      description: Group is the group of the target resource.
                      type: string
                      maxLength: 253
                      pattern: '^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
                    kind:
                      description: Kind is kind of the target resource.
                      type: string
                      maxLength: 63
                      minLength: 1
                      pattern: '^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$'
                    name:
                      description: Name is the name of the target resource.
                      type: string
                      maxLength: 253
                      minLength: 1
                    sectionName:
                      description: |-
                        SectionName is the name of a section within the target resource. When
                        unspecified, this targetRef targets the entire resource. In the following
                        resources, SectionName is interpreted as the following:

                        * Gateway: Listener name
                        * HTTPRoute: HTTPRouteRule name
                        * Service: Port name

                        If a SectionName is specified, but does not exist on the targeted object,
                        the Policy must fail to attach, and the policy implementation should record
                        a `ResolvedRefs` or similar Condition in the Policy's status.
                      type: string
                      maxLength: 253
                      minLength: 1
                      pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
                  x-kubernetes-validations:
                    - rule: self.group == 'gateway.networking.k8s.io'
                      message: Invalid targetRef.group. The only supported value is 'gateway.networking.k8s.io'
                    - rule: self.kind == 'HTTPRoute' || self.kind == 'Gateway'
                      message: Invalid targetRef.kind. The only supported values are 'HTTPRoute' and 'Gateway'
            status:
              description: PlanPolicyStatus defines the observed state of PlanPolicy
              type: object
              properties:
                conditions:
                  description: |-
                    Represents the observations of a PlanPolicy's current state.
                    Known .status.conditions.type are: "Accepted", "Enforced"
                  type: array
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        type: string
                        format: date-time
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                      status:
                        description: 'status of the condition, one of True, False, Unknown.'
                        type: string
                        enum:
                          - 'True'
                          - 'False'
                          - Unknown
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        type: string
                        maxLength: 316
                        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$'
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  description: ObservedGeneration reflects the generation of the most recently observed spec.
                  type: integer
                  format: int64
      subresources:
        status: {}
