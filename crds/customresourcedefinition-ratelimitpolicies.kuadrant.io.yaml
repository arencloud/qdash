                                    Well-known selectors: https://github.com/Kuadrant/architecture/blob/main/rfcs/0001-rlp-v2.md#well-known-selectors
                                    They are named by a dot-separated path (e.g. request.path)
                                    Example: "request.path" -> The path portion of the URL
                                  type: string
                                  minLength: 1
                          rates:
                            description: Rates holds the list of limit rates
                            type: array
                            items:
                              description: Rate defines the actual rate limit that will be used when there is a match
                              type: object
                              required:
                                - limit
                                - window
                              properties:
                                limit:
                                  description: Limit defines the max value allowed for a given period of time
                                  type: integer
                                window:
                                  description: Window defines the time period for which the Limit specified above applies.
                                  type: string
                                  pattern: '^([0-9]{1,5}(h|m|s|ms)){1,4}$'
                          when:
                            description: |-
                              When holds a list of "limit-level" `Predicate`s
                              Called also "soft" conditions as route selectors must also match
                            type: array
                            items:
                              description: Predicate defines one CEL expression that must be evaluated to bool
                              type: object
                              required:
                                - predicate
                              properties:
                                predicate:
                                  type: string
                                  minLength: 1
                    strategy:
                      description: Strategy defines the merge strategy to apply when merging this policy with other policies.
                      type: string
                      default: atomic
                      enum:
                        - atomic
                        - merge
                    when:
                      description: |-
                        Overall conditions for the policy to be enforced.
                        If omitted, the policy will be enforced at all requests to the protected routes.
                        If present, all conditions must match for the policy to be enforced.
                      type: array
                      items:
                        description: Predicate defines one CEL expression that must be evaluated to bool
                        type: object
                        required:
                          - predicate
                        properties:
                          predicate:
                            type: string
                            minLength: 1
                limits:
                  description: Limits holds the struct of limits indexed by a unique name
                  type: object
                  additionalProperties:
                    description: Limit represents a complete rate limit configuration
                    type: object
                    properties:
                      counters:
                        description: Counters defines additional rate limit counters based on CEL expressions which can reference well known selectors
                        type: array
                        items:
                          type: object
                          required:
                            - expression
                          properties:
                            expression:
                              description: |-
                                Expression defines one CEL expression
                                Expression can use well known attributes
                                Attributes: https://www.envoyproxy.io/docs/envoy/latest/intro/arch_overview/advanced/attributes
                                Well-known selectors: https://github.com/Kuadrant/architecture/blob/main/rfcs/0001-rlp-v2.md#well-known-selectors
                                They are named by a dot-separated path (e.g. request.path)
                                Example: "request.path" -> The path portion of the URL
                              type: string
                              minLength: 1
                      rates:
                        description: Rates holds the list of limit rates
                        type: array
                        items:
                          description: Rate defines the actual rate limit that will be used when there is a match
                          type: object
                          required:
                            - limit
                            - window
                          properties:
                            limit:
                              description: Limit defines the max value allowed for a given period of time
                              type: integer
                            window:
                              description: Window defines the time period for which the Limit specified above applies.
                              type: string
                              pattern: '^([0-9]{1,5}(h|m|s|ms)){1,4}$'
                      when:
                        description: |-
                          When holds a list of "limit-level" `Predicate`s
                          Called also "soft" conditions as route selectors must also match
                        type: array
                        items:
                          description: Predicate defines one CEL expression that must be evaluated to bool
                          type: object
                          required:
                            - predicate
                          properties:
                            predicate:
                              type: string
                              minLength: 1
                overrides:
                  description: |-
                    Rules to apply as overrides. Override all policy rules lower in the hierarchy. Can be overridden by less specific policy overrides.
                    Use one of: defaults, overrides, or bare set of policy rules (implicit defaults).
                  type: object
                  properties:
                    limits:
                      description: Limits holds the struct of limits indexed by a unique name
                      type: object
                      additionalProperties:
                        description: Limit represents a complete rate limit configuration
                        type: object
                        properties:
                          counters:
                            description: Counters defines additional rate limit counters based on CEL expressions which can reference well known selectors
                            type: array
                            items:
                              type: object
                              required:
                                - expression
                              properties:
                                expression:
                                  description: |-
                                    Expression defines one CEL expression
                                    Expression can use well known attributes
                                    Attributes: https://www.envoyproxy.io/docs/envoy/latest/intro/arch_overview/advanced/attributes
                                    Well-known selectors: https://github.com/Kuadrant/architecture/blob/main/rfcs/0001-rlp-v2.md#well-known-selectors
                                    They are named by a dot-separated path (e.g. request.path)
                                    Example: "request.path" -> The path portion of the URL
                                  type: string
                                  minLength: 1
                          rates:
                            description: Rates holds the list of limit rates
                            type: array
                            items:
                              description: Rate defines the actual rate limit that will be used when there is a match
                              type: object
                              required:
                                - limit
                                - window
                              properties:
                                limit:
                                  description: Limit defines the max value allowed for a given period of time
                                  type: integer
                                window:
                                  description: Window defines the time period for which the Limit specified above applies.
                                  type: string
                                  pattern: '^([0-9]{1,5}(h|m|s|ms)){1,4}$'
                          when:
                            description: |-
