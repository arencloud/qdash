                            type: array
                            items:
                              description: Predicate defines one CEL expression that must be evaluated to bool
                              type: object
                              required:
                                - predicate
                              properties:
                                predicate:
                                  type: string
                                  minLength: 1
                    strategy:
                      description: Strategy defines the merge strategy to apply when merging this policy with other policies.
                      type: string
                      default: atomic
                      enum:
                        - atomic
                        - merge
                    when:
                      description: |-
                        Overall conditions for the policy to be enforced.
                        If omitted, the policy will be enforced at all requests to the protected routes.
                        If present, all conditions must match for the policy to be enforced.
                      type: array
                      items:
                        description: Predicate defines one CEL expression that must be evaluated to bool
                        type: object
                        required:
