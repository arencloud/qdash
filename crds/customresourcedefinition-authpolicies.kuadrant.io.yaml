                      type: object
                      properties:
                        authentication:
                          description: |-
                            Authentication configs.
                            At least one config MUST evaluate to a valid identity object for the auth request to be successful.
                          type: object
                          additionalProperties:
                            type: object
                            properties:
                              oauth2Introspection:
                                description: Authentication by OAuth2 token introspection.
                                type: object
                                required:
                                  - credentialsRef
                                  - endpoint
                                properties:
                                  credentialsRef:
                                    description: 'Reference to a Kubernetes secret in the same namespace, that stores client credentials to the OAuth2 server.'
                                    type: object
                                    properties:
                                      name:
                                        description: |-
                                          Name of the referent.
                                          This field is effectively required, but due to backwards compatibility is
                                          allowed to be empty. Instances of this type with an empty value here are
                                          almost certainly wrong.
                                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                        type: string
                                        default: ''
                                    x-kubernetes-map-type: atomic
                                  endpoint:
                                    description: The full URL of the token introspection endpoint.
                                    type: string
                                  tokenTypeHint:
                                    description: |-
                                      The token type hint for the token introspection.
                                      If omitted, it defaults to "access_token".
                                    type: string
