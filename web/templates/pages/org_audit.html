{{define "org_audit"}}
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Audit</title><link rel="stylesheet" href="/static/css/app.css"></head>
<body>
<main class="shell">
  <section class="hero compact">
    <h1>Audit Events</h1>
    <p>Organization: {{.Slug}}</p>
  </section>
  <section class="card">
    <table class="audit-table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Type</th>
          <th>Status</th>
          <th>Resource</th>
          <th>Message</th>
          <th>Actor</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
      {{range .Rows}}
        <tr>
          <td>{{.CreatedAt}}</td>
          <td>{{.EventType}}</td>
          <td>{{.Status}}</td>
          <td>{{.Resource}}</td>
          <td>{{.Message}}</td>
          <td>{{.Actor}}</td>
          <td>
            <details class="details-box">
              <summary>View JSON</summary>
              <pre>{{.Details}}</pre>
            </details>
          </td>
        </tr>
      {{else}}
        <tr><td colspan="7">No audit events yet.</td></tr>
      {{end}}
      </tbody>
    </table>
  </section>
</main>
</body></html>
{{end}}
