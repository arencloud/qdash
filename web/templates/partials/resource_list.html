{{define "resource_list"}}
<table class="audit-table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Created</th>
      <th>Spec</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {{range .Rows}}
    <tr>
      <td>{{.Name}}</td>
      <td>{{.CreatedAt}}</td>
      <td>
        <details class="details-box"><summary>View</summary><pre>{{.Spec}}</pre></details>
      </td>
      <td>
        <form hx-get="/organizations/{{$.Slug}}/resources/{{$.KindParam}}/edit" hx-target="#{{$.FeedbackID}}" hx-swap="innerHTML">
          <input type="hidden" name="namespace" value="{{$.Namespace}}">
          <input type="hidden" name="name" value="{{.Name}}">
          <button type="submit">Edit</button>
        </form>
        <form hx-post="/organizations/{{$.Slug}}/resources/{{$.KindParam}}/delete" hx-target="#{{$.FeedbackID}}" hx-swap="innerHTML">
          <input type="hidden" name="namespace" value="{{$.Namespace}}">
          <input type="hidden" name="name" value="{{.Name}}">
          <button type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {{else}}
    <tr><td colspan="4">No resources found in namespace <code>{{.Namespace}}</code>.</td></tr>
    {{end}}
  </tbody>
</table>
{{end}}
