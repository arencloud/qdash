{{define "org_list"}}
<div class="card-stack" id="org-list">
  {{range .Organizations}}
    <div class="card">
      <h3>{{.Name}}</h3>
      <p class="muted">slug: <code>{{.Slug}}</code></p>
      <div class="actions">
        <a href="/organizations/{{.Slug}}/settings">Settings</a>
        <a href="/organizations/{{.Slug}}/rbac">RBAC</a>
        <a href="/organizations/{{.Slug}}/oidc">OIDC</a>
        <a href="/organizations/{{.Slug}}/resources">Resources</a>
        <a href="/organizations/{{.Slug}}/audit">Audit</a>
      </div>
    </div>
  {{else}}
    <div class="card empty">
      <h3>No Organizations Yet</h3>
      <p>Create your first organization to unlock RBAC, OIDC mapping, resource CRUD, and audit views.</p>
    </div>
  {{end}}
</div>
{{end}}
